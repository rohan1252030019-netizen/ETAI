name: "Credential Theft Response Playbook"
trigger:
  event_type: "credential_theft"
  severity: "HIGH"
severity: "HIGH"
actions:
  - name: "Disable Compromised Active Directory Account"
    action_type: "AD_COMMAND"
    params:
      username: "${event.username}"
    timeout: 10
  - name: "Revoke Active Access Tokens"
    action_type: "IDENTITY_API"
    params:
      token_hash: "${event.token_hash}"
    timeout: 10
  - name: "Enforce Hardware MFA Challenge"
    action_type: "MFA_ENFORCEMENT"
    params:
      username: "${event.username}"
    timeout: 10
  - name: "Notify Identity Operations Center"
    action_type: "SLACK_NOTIFICATION"
    params:
      channel: "#identity-security"
      message: "WARNING: Active Directory account '${event.username}' disabled due to credential theft detection."
    timeout: 5
